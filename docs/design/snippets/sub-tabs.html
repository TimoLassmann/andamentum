<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — in-page sub-tabs</title>
<link rel="stylesheet" href="../components.css">
<style>
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header { font-family: var(--am-font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--am-ink-5); padding-bottom: var(--am-sp-3); border-bottom: var(--am-hair) solid var(--am-rule); margin-bottom: var(--am-sp-6); }
    .snip-header h1 { font-family: var(--am-font-serif); font-size: 22px; font-weight: 700; color: var(--am-ink); margin: 4px 0 0; letter-spacing: -0.2px; text-transform: none; }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>
<header class="snip-header">Andamentum · snippet<h1>in-page sub-tabs</h1></header>
<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">

<!-- Sub-tabs: a quieter variant of .am-tabs for navigation INSIDE a
     section. Underline-only active state, no pill background. -->
<nav class="am-tabs am-tabs--sub">
    <button class="am-tab is-active">Findings</button>
    <button class="am-tab">Sources</button>
    <button class="am-tab">Methodology</button>
    <button class="am-tab">Discussion</button>
</nav>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->
</body>
</html>
