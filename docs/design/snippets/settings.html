<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — settings section</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>settings section</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · settings section -->
<div class="am-settings-section">
    <h3 class="am-settings-section__title">Daily routine</h3>
    <p class="am-settings-section__intro">
        Controls when the daily briefing is generated and how the morning queue is built.
    </p>

    <div class="am-settings-row">
        <div>
            <div class="am-settings-row__label">Wake time</div>
            <div class="am-settings-row__help">
                The time the morning brief is generated and queued in your inbox.
            </div>
        </div>
        <div>
            <input class="am-input" type="time" value="06:00">
        </div>
    </div>

    <div class="am-settings-row">
        <div>
            <div class="am-settings-row__label">Default LLM</div>
            <div class="am-settings-row__help">
                Used when no per-action override is set.
            </div>
        </div>
        <div>
            <select class="am-select">
                <option>gemma4:26b</option>
                <option>claude-haiku-4.5</option>
                <option>gpt-5.4-mini</option>
            </select>
        </div>
    </div>
</div>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
