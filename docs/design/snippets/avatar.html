<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — avatar</title>
<link rel="stylesheet" href="../components.css">
<style>
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header { font-family: var(--am-font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--am-ink-5); padding-bottom: var(--am-sp-3); border-bottom: var(--am-hair) solid var(--am-rule); margin-bottom: var(--am-sp-6); }
    .snip-header h1 { font-family: var(--am-font-serif); font-size: 22px; font-weight: 700; color: var(--am-ink); margin: 4px 0 0; letter-spacing: -0.2px; text-transform: none; }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>
<header class="snip-header">Andamentum · snippet<h1>avatar</h1></header>
<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">

<!-- Initials avatars. Pair short initials (2 letters max) with serif. -->
<span class="am-avatar am-avatar--sm">JS</span>
<span class="am-avatar">JS</span>
<span class="am-avatar am-avatar--lg">JS</span>

<!-- Semantic-tinted avatars — quiet, in-palette. -->
<span class="am-avatar" style="background: var(--am-info-bg); color: var(--am-info-ink); border-color: transparent;">RN</span>
<span class="am-avatar" style="background: var(--am-success-bg); color: var(--am-success-ink); border-color: transparent;">MK</span>

<!-- Image avatar — drop a square image inside the circle. -->
<span class="am-avatar"><img src="/path/to/avatar.jpg" alt=""></span>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->
</body>
</html>
