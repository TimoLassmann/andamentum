<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — chips (filter rows, quick actions)</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>chips (filter rows, quick actions)</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · chips (filter rows, quick actions) -->
<div style="display: flex; flex-wrap: wrap; gap: 8px;">
    <button class="am-chip is-active">All Active</button>
    <button class="am-chip">Inbox</button>
    <button class="am-chip">To Do</button>
    <button class="am-chip">In Progress</button>
    <button class="am-chip">Waiting</button>
    <button class="am-chip">Completed</button>
</div>

<!-- Chip with a leading dot. -->
<button class="am-chip">
    <span class="am-dot am-dot--success" style="width: 6px; height: 6px;"></span>
    Running
</button>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
