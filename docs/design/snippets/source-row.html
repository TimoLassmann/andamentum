<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — source row (watched feeds / pages)</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>source row (watched feeds / pages)</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · source row (watched feeds / pages) -->
<div class="am-list am-list--bordered">

    <div class="am-source-row">
        <span class="am-source-row__favicon">B</span>
        <div class="am-source-row__main">
            <div class="am-source-row__title">BBC News — World</div>
            <div class="am-source-row__url">bbc.com/news/world</div>
        </div>
        <span class="am-meta">12 today</span>
    </div>

    <div class="am-source-row">
        <span class="am-source-row__favicon">C</span>
        <div class="am-source-row__main">
            <div class="am-source-row__title">CNN — International</div>
            <div class="am-source-row__url">edition.cnn.com/world</div>
        </div>
        <span class="am-meta">17 today</span>
    </div>

    <div class="am-source-row">
        <span class="am-source-row__favicon">A</span>
        <div class="am-source-row__main">
            <div class="am-source-row__title">arXiv stat.ME</div>
            <div class="am-source-row__url">arxiv.org/list/stat.ME</div>
        </div>
        <span class="am-meta">3 today</span>
    </div>

</div>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
