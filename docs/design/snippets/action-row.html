<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — action row (scheduled actions, e.g. morning brief)</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>action row (scheduled actions, e.g. morning brief)</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · action row (scheduled actions, e.g. morning brief) -->
<div class="am-list am-list--bordered">

    <div class="am-action-row">
        <span class="am-dot am-dot--success"></span>
        <div class="am-action-row__title">Morning brief — world news</div>
        <div class="am-action-row__sched">daily · 06:00 AWST</div>
        <span class="am-badge am-badge--success">RUNNING</span>
    </div>

    <div class="am-action-row">
        <span class="am-dot am-dot--warn"></span>
        <div class="am-action-row__title">Literature watch — type-2 diabetes</div>
        <div class="am-action-row__sched">weekly · Mon 09:00</div>
        <span class="am-badge am-badge--warn">PAUSED</span>
    </div>

    <div class="am-action-row">
        <span class="am-dot"></span>
        <div class="am-action-row__title">CV refresh from arXiv</div>
        <div class="am-action-row__sched">monthly</div>
        <span class="am-badge">IDLE</span>
    </div>

</div>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
