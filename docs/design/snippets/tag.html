<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — tag</title>
<link rel="stylesheet" href="../components.css">
<style>
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-5); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>tag &amp; tag-add</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">

    <!-- Tag row: a sequence of removable tags + an "add" affordance.
         Use this for content tagging surfaces (e.g. document metadata),
         NOT for filter selection — for filters, use .am-chip. -->
    <div class="am-tags">
        <span class="am-tag">
            Raúl Castro
            <button class="am-tag__close" aria-label="Remove">×</button>
        </span>
        <span class="am-tag">
            Trump
            <button class="am-tag__close" aria-label="Remove">×</button>
        </span>
        <span class="am-tag">
            Ollama
            <button class="am-tag__close" aria-label="Remove">×</button>
        </span>
        <button class="am-tag-add" aria-label="Add tag">+</button>
    </div>

    <!-- Tinted variants — use sparingly and only when the tag itself
         carries semantic meaning (e.g. a "research" tag in your kind palette). -->
    <div class="am-tags">
        <span class="am-tag am-tag--info">research</span>
        <span class="am-tag am-tag--warn">draft</span>
        <span class="am-tag am-tag--success">verified</span>
        <span class="am-tag am-tag--danger">retracted</span>
    </div>

    <!-- Static tag (no close button) — for read-only tag display. -->
    <span class="am-tag">read-only</span>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
