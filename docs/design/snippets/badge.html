<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — badges & status</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>badges & status</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · badges & status -->
<!-- UI-mode badges (Inter, uppercase, tracked). -->
<span class="am-badge">DEFAULT</span>
<span class="am-badge am-badge--info">INFO</span>
<span class="am-badge am-badge--success">SUCCESS</span>
<span class="am-badge am-badge--warn">WARN</span>
<span class="am-badge am-badge--danger">DANGER</span>
<span class="am-badge am-badge--note">NOTE</span>
<span class="am-badge am-badge--outline">OUTLINE</span>

<!-- Badge with an inline dot. -->
<span class="am-badge am-badge--success">
    <span class="am-badge__dot"></span>
    RUNNING
</span>

<!-- Status dots (no label needed). -->
<span class="am-dot am-dot--success"></span>
<span class="am-dot am-dot--info"></span>
<span class="am-dot am-dot--warn"></span>
<span class="am-dot am-dot--danger"></span>

<!-- Document-mode badge — used inside .typeset-card / .typeset-reference.
     Drives colour from data-value attribute. -->
<span class="typeset-badge" data-value="supports">supports</span>
<span class="typeset-badge" data-value="supported">supported</span>
<span class="typeset-badge" data-value="contradicts">contradicts</span>
<span class="typeset-badge" data-value="challenged">challenged</span>
<span class="typeset-badge">neutral</span>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
