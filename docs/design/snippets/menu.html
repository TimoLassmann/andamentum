<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — dropdown menu</title>
<link rel="stylesheet" href="../components.css">
<style>
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header { font-family: var(--am-font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--am-ink-5); padding-bottom: var(--am-sp-3); border-bottom: var(--am-hair) solid var(--am-rule); margin-bottom: var(--am-sp-6); }
    .snip-header h1 { font-family: var(--am-font-serif); font-size: 22px; font-weight: 700; color: var(--am-ink); margin: 4px 0 0; letter-spacing: -0.2px; text-transform: none; }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>
<header class="snip-header">Andamentum · snippet<h1>dropdown menu</h1></header>
<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">

<!-- Generic popover menu. Use <button> for actions, <a> for navigation.
     Position absolutely / via popper.js etc. in production. -->
<div class="am-menu" style="position: static; display: inline-block;">

    <div class="am-menu__group">
        <button class="am-menu__item">
            <span class="am-menu__item__icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg>
            </span>
            New document
            <span class="am-menu__item__shortcut">⌘N</span>
        </button>
        <button class="am-menu__item">Open from URL…</button>
    </div>

    <div class="am-menu__group">
        <div class="am-menu__label">Document</div>
        <button class="am-menu__item">Rename</button>
        <button class="am-menu__item">Duplicate</button>
        <button class="am-menu__item">Export…</button>
    </div>

    <div class="am-menu__group">
        <button class="am-menu__item is-danger">
            <span class="am-menu__item__icon">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M6 4V2.5h4V4M5 4l1 9h4l1-9"/></svg>
            </span>
            Delete
        </button>
    </div>

</div>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->
</body>
</html>
