<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — pagination</title>
<link rel="stylesheet" href="../components.css">
<style>
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header { font-family: var(--am-font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--am-ink-5); padding-bottom: var(--am-sp-3); border-bottom: var(--am-hair) solid var(--am-rule); margin-bottom: var(--am-sp-6); }
    .snip-header h1 { font-family: var(--am-font-serif); font-size: 22px; font-weight: 700; color: var(--am-ink); margin: 4px 0 0; letter-spacing: -0.2px; text-transform: none; }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>
<header class="snip-header">Andamentum · snippet<h1>pagination</h1></header>
<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">

<!-- Pagination. Mark the current page with .is-current or
     aria-current="page". Use .am-pagination__gap for "…" ellipsis. -->

<nav class="am-pagination" aria-label="Pagination">
    <button disabled aria-label="Previous">‹</button>
    <button>1</button>
    <button>2</button>
    <button class="is-current" aria-current="page">3</button>
    <button>4</button>
    <button>5</button>
    <span class="am-pagination__gap">…</span>
    <button>27</button>
    <button aria-label="Next">›</button>
</nav>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->
</body>
</html>
