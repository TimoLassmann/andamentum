<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Andamentum — tabs</title>
<link rel="stylesheet" href="../components.css">
<style>
    /* Snippet preview wrapper only — not part of the system. */
    body { padding: 48px 32px; max-width: 880px; margin: 0 auto; }
    .snip-header {
        font-family: var(--am-font-sans);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--am-ink-5);
        padding-bottom: var(--am-sp-3);
        border-bottom: var(--am-hair) solid var(--am-rule);
        margin-bottom: var(--am-sp-6);
    }
    .snip-header h1 {
        font-family: var(--am-font-serif);
        font-size: 22px;
        font-weight: 700;
        color: var(--am-ink);
        margin: 4px 0 0;
        letter-spacing: -0.2px;
        text-transform: none;
    }
    .snip-stack > * + * { margin-top: var(--am-sp-4); }
</style>
</head>
<body>

<header class="snip-header">
    Andamentum · snippet
    <h1>tabs</h1>
</header>

<!-- ─── snippet markup ─────────────────────────────────────────── -->
<div class="snip-stack">
<!-- Andamentum · tabs (top-level navigation)
     For in-page section tabs, use the same .am-tab class inside any
     .am-tabs container. -->
<nav class="am-tabs">
    <button class="am-tab is-active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
        Work
    </button>
    <button class="am-tab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Browse
    </button>
    <button class="am-tab">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2 4 14h6l-1 8 9-12h-6z"/></svg>
        Actions
    </button>
</nav>
</div>
<!-- ─── end snippet ────────────────────────────────────────────── -->

</body>
</html>
