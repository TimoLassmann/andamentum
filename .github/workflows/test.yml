name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run picks up dependency-supply-chain rot (e.g. a freshly-pulled
  # transitive package starts misbehaving) even with no code change.
  schedule:
    - cron: "0 7 * * 1"

# Cancel in-flight runs on the same ref when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Force every uv command (sync + all `uv run`) to use the matrix Python.
    # Without this the committed `.python-version` (3.12) wins and uv builds a
    # 3.12 venv on EVERY leg — so the 3.11/3.13 legs silently re-test 3.12.
    # Setting it once at the job level is the robust fix: a bare `uv run`
    # otherwise recreates the venv from `.python-version`, undoing a per-command
    # `--python` flag mid-job.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # Project floor is 3.11 (per pyproject's requires-python; epistemic
        # uses typing.Self, 3.11+); pyright config targets 3.13. We test the
        # floor + the pyright target on both Linux and macOS, with the
        # in-between minor on Linux only to keep the matrix manageable.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Pin uv to avoid uv-version drift causing different lock
          # resolutions across runs. Bump deliberately. Must track the
          # local uv series that produces uv.lock: the lockfile is written
          # at revision 3 with a relative exclude-newer span (P28D), which
          # only uv >= 0.11 understands. An older pin ignores the lockfile
          # and fails `uv sync --locked`.
          version: "0.11.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        # --locked refuses to re-resolve; if uv.lock is stale relative to
        # pyproject.toml, the job fails loudly. That is intentional —
        # lock drift is a supply-chain concern.
        run: uv sync --locked --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format --check)
        run: uv run ruff format --check

      - name: Run tests (default markers)
        # The ollama, benchmark, cloud, and live_provider markers are
        # deselected by addopts in pyproject.toml; this runs the offline
        # tier only. Network-dependent / paid markers are not part of
        # the default CI surface.
        run: uv run pytest

  examples:
    name: examples (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev
      - name: Execute every example
        # The files under examples/ are advertised in the README as runnable.
        # Execute each one so a renamed/removed public API (the kind of drift
        # that silently breaks the documented onboarding path) fails the build.
        # Every committed example must run offline — no LLM, no SearXNG, no
        # network. If an example needs a live service, gate it behind an env
        # check rather than letting it break this job.
        run: |
          set -e
          found=0
          while IFS= read -r ex; do
            found=1
            echo "::group::$ex"
            uv run python "$ex"
            echo "::endgroup::"
          done < <(find examples -name '*.py' -type f | sort)
          if [ "$found" -eq 0 ]; then
            echo "No examples found under examples/ — expected at least one." >&2
            exit 1
          fi

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python 3.13
        run: uv python install 3.13
      - name: Install dependencies (locked)
        run: uv sync --locked --extra dev
      - name: Pyright
        # The canonical green state documented in CLAUDE.md tolerates 23
        # pre-existing test-only typing errors (pydantic-graph variance,
        # Decomposition dict-form fixtures). Pyright's exit is 1 when any
        # errors are reported. Keep the step non-blocking until those are
        # cleaned up, but still surface the diff in PRs.
        run: uv run pyright || true
